version: '3.9'

services:
  api:
    build:
      context:  .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CloudinarySettings__CloudName=${CLOUDINARY_CLOUD_NAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - CloudinarySettings__DefaultImageUrl=https://res.cloudinary.com/demo/image/upload/v1234567890/default.jpg
    restart: unless-stopped
    volumes:
      - .:/app
  
  